name: Mise a jour Morning Lineup

on:
  schedule:
    - cron: '10 5 * * *' # 07h10 heure de France
  workflow_dispatch: # Permet de lancer le test manuellement

permissions:
  contents: write

jobs:
  update-lineup:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Lancer le script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update.py

      - name: Sauvegarder les modifications
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Mise à jour automatique" || echo "Pas de changement"
          git push
